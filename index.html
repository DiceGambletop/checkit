<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>✅ Checklist Maker</h1>

    <div class="creator">

        <input
            type="text"
            id="taskName"
            placeholder="Task name..."
        >

        <select id="priority">
            <option value="Low">🟢 Low</option>
            <option value="Medium">🟡 Medium</option>
            <option value="High">🔴 High</option>
        </select>

        <input
            type="number"
            id="totalSteps"
            min="1"
            value="1"
            placeholder="Total Steps"
        >

        <button id="addTask">
            Add Task
        </button>

    </div>

    <div class="overall-progress">
        <h3>Overall Progress</h3>
        <span id="overallText">0 / 0 Completed</span>
        <div class="bar">
            <div id="overallBar"></div>
        </div>
    </div>
<button id="selectMultiple">Select Multiple</button>
<button id="selectAll" style="display:none;">✔ Select All</button>

<div id="bulkActions" style="display:none; gap:10px; margin:10px 0;">
    <button id="bulkCategorize">Categorize</button>
    <button id="bulkDelete">Delete Selected</button>
</div>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
